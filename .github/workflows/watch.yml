# Scheduler for the ladder watcher: fires every 12 hours and drives the
# chunked worker route until the pass completes. Each hit does ~7 s of work
# within Vercel Hobby's 10 s limit and persists a cursor; a full top-50 pass
# is ~20-40 hits. Vercel Cron (vercel.json) stays as a once-daily fallback.
#
# Repo setup:
#   Secret  CRON_SECRET — same value as the Vercel env var
#   Variable WATCH_URL  — e.g. https://champscope.vercel.app/api/watch/run
name: ladder-watch
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

jobs:
  pass:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Drive the watch pass to completion
        run: |
          for i in $(seq 1 120); do
            out=$(curl --fail-with-body -sS \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ vars.WATCH_URL }}?trigger=gh")
            echo "tick $i: $out"
            case "$out" in
              *'"status":"finished"'*|*'"status":"cooldown"'*|*'"status":"noop"'*) break ;;
            esac
            sleep 3
          done
